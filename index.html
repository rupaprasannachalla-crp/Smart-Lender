<!-- templates/index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Smart Lender</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; text-align: center; }
        .container { width: 50%; margin: auto; background: white; padding: 20px; box-shadow: 0px 0px 10px #ccc; margin-top: 30px; border-radius: 8px; }
        select, input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 93%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Smart Lender: Loan Eligibility Prediction</h2>
        <form action="/predict" method="post">
            <select name="Gender" required><option value="">Select Gender</option><option value="1">Male</option><option value="0">Female</option></select>
            <select name="Married" required><option value="">Marital Status</option><option value="1">Yes</option><option value="0">No</option></select>
            <select name="Dependents" required><option value="">Dependents</option><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3+</option></select>
            <select name="Education" required><option value="">Education</option><option value="0">Graduate</option><option value="1">Not Graduate</option></select>
            <select name="Self_Employed" required><option value="">Self Employed?</option><option value="1">Yes</option><option value="0">No</option></select>
            <input type="number" name="ApplicantIncome" placeholder="Applicant Income" required>
            <input type="number" name="CoapplicantIncome" placeholder="Coapplicant Income" required>
            <input type="number" name="LoanAmount" placeholder="Loan Amount (in Thousands)" required>
            <input type="number" name="Loan_Amount_Term" placeholder="Loan Term (in Days, e.g., 360)" required>
            <select name="Credit_History" required><option value="">Credit History</option><option value="1">Good (1.0)</option><option value="0">Bad (0.0)</option></select>
            <select name="Property_Area" required><option value="">Property Area</option><option value="2">Urban</option><option value="1">Semiurban</option><option value="0">Rural</option></select>
            <button type="submit">Predict Eligibility</button>
        </form>
    </div>
</body>
</html>
